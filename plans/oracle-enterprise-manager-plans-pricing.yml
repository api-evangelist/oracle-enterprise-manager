specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Oracle Enterprise Manager
providerId: oracle-enterprise-manager
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Enterprise Management
  - Database Management
  - Monitoring
  - Oracle
description: Oracle Enterprise Manager (OEM) Cloud Control is included free with the underlying Oracle
  software, but most useful capabilities are gated behind separately-licensed Management Packs. Public
  list prices come from the Oracle Technology Price List with both per-Processor and per-Named-User-Plus
  metrics; annual Software Update License & Support is 22% of license. Each pack typically requires the
  same metric on the same targets (DB, host, middleware) being managed. OEM Cloud Management Pack for
  Oracle Cloud is also offered; OCI provides Observability and Management cloud services as a separate
  consumption-based alternative.
sources:
  - https://www.oracle.com/manageability/
  - https://docs.oracle.com/en/enterprise-manager/cloud-control/enterprise-manager-cloud-control/24.1/oemli/enterprise-manager-licensing-information-user-manual.pdf
plans:
  - id: oracle-em-base
    name: Enterprise Manager Cloud Control (base)
    type: freemium
    description: Base OEM framework — agents, console, basic monitoring of Oracle DB, middleware, and
      hosts — included at no additional cost with the underlying Oracle license.
    entries:
      - label: Base OEM framework
        name: em_base
        type: flat
        metric: install
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Agents on managed targets
      - name: Console / web UI
      - name: Basic monitoring
      - name: Job and group management
  - id: oracle-em-diagnostics-pack
    name: Diagnostics Pack
    type: subscription
    description: Performance diagnostics — AWR, ASH, ADDM, performance hub. Requires same metric on managed
      databases.
    entries:
      - label: Diagnostics Pack per Processor
        name: diagnostics_processor
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '7500.00'
        userMultiplied: false
      - label: Diagnostics Pack NUP
        name: diagnostics_nup
        type: subscription
        metric: named_user
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '150.00'
        userMultiplied: true
      - label: Diagnostics Pack annual support
        name: diagnostics_support
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '1650.00'
        userMultiplied: false
    elements:
      - name: AWR / ASH / ADDM
      - name: Performance Hub
      - name: 22% annual support
  - id: oracle-em-tuning-pack
    name: Tuning Pack
    type: subscription
    description: SQL Tuning Advisor, SQL Access Advisor, SQL Profiles. Requires Diagnostics Pack as a
      prerequisite on the same targets.
    entries:
      - label: Tuning Pack per Processor
        name: tuning_processor
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '5000.00'
        userMultiplied: false
      - label: Tuning Pack NUP
        name: tuning_nup
        type: subscription
        metric: named_user
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '100.00'
        userMultiplied: true
      - label: Tuning Pack annual support
        name: tuning_support
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '1100.00'
        userMultiplied: false
    elements:
      - name: SQL Tuning + Access Advisor
      - name: Requires Diagnostics Pack
      - name: 22% annual support
  - id: oracle-em-database-lifecycle-management-pack
    name: Database Lifecycle Management Pack
    type: subscription
    description: Discovery, provisioning, patching, configuration management, and compliance reporting
      for the Oracle DB lifecycle.
    entries:
      - label: DB Lifecycle Management Pack per Processor
        name: dblm_processor
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '12000.00'
        userMultiplied: false
      - label: DB Lifecycle Management Pack NUP
        name: dblm_nup
        type: subscription
        metric: named_user
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '240.00'
        userMultiplied: true
      - label: DB Lifecycle Management Pack annual support
        name: dblm_support
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '2640.00'
        userMultiplied: false
    elements:
      - name: Provisioning + patching automation
      - name: Configuration management and compliance
      - name: 22% annual support
  - id: oracle-em-other-packs
    name: Other Management Packs
    type: subscription
    description: Additional packs include Data Masking + Subsetting, Cloud Management Pack for Oracle
      Cloud, WebLogic Server Management Pack EE, Real Application Testing, etc. Each per-Processor or
      per-NUP from the Technology Price List with 22% annual support.
    entries:
      - label: Other packs (per Processor / NUP)
        name: other_packs
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: see Oracle Technology Price List
        userMultiplied: false
    elements:
      - name: Data Masking + Subsetting Pack
      - name: Cloud Management Pack for Oracle Cloud
      - name: WebLogic Server Management Pack Enterprise Edition
      - name: Real Application Testing
  - id: oracle-em-oci-observability
    name: OCI Observability and Management (alternative)
    type: usage-based
    description: Cloud-native consumption-based alternative on OCI — Logging, Monitoring, Operations
      Insights, Database Management, etc., billed per usage rather than as packs.
    entries:
      - label: OCI O+M services
        name: oci_om
        type: metered
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://www.oracle.com/manageability/pricing/
        userMultiplied: false
    elements:
      - name: Pay-as-you-go
      - name: Cloud-native, no agent install
      - name: Available via Universal Credits
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
