components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >-
        HTTP Basic Authentication using Enterprise Manager administrator
        credentials. All API requests must include valid credentials.
  parameters:
    targetIdPath:
      name: targetId
      in: path
      required: true
      description: Unique identifier of the target.
      schema:
        type: string
    targetNameQuery:
      name: targetName
      in: query
      description: Filter targets by name. Supports partial matching.
      schema:
        type: string
    targetTypeQuery:
      name: targetType
      in: query
      description: >-
        Filter targets by type (e.g., oracle_database, host, weblogic_j2eeserver).
      schema:
        type: string
    lifecycleStatusQuery:
      name: lifecycleStatus
      in: query
      description: Filter targets by lifecycle status.
      schema:
        type: string
        enum:
        - MONITORED
        - BLACKOUT
        - PENDING
        - DELETED
    limitQuery:
      name: limit
      in: query
      description: Maximum number of items to return per page.
      schema:
        type: integer
        default: 25
        minimum: 1
        maximum: 1000
    offsetQuery:
      name: offset
      in: query
      description: Number of items to skip for pagination.
      schema:
        type: integer
        default: 0
        minimum: 0
    incidentIdPath:
      name: incidentId
      in: path
      required: true
      description: Unique identifier of the incident.
      schema:
        type: string
    eventIdPath:
      name: eventId
      in: path
      required: true
      description: Unique identifier of the event.
      schema:
        type: string
    blackoutIdPath:
      name: blackoutId
      in: path
      required: true
      description: Unique identifier of the blackout.
      schema:
        type: string
    metricGroupNamePath:
      name: metricGroupName
      in: path
      required: true
      description: Name of the metric group.
      schema:
        type: string
  schemas:
    Target:
      type: object
      description: >-
        Represents a monitored target in Enterprise Manager. A target is any
        managed entity such as a database, host, middleware instance, or
        application.
      properties:
        targetId:
          type: string
          description: Unique identifier of the target.
          example: '500123'
        targetName:
          type: string
          description: Display name of the target.
          example: example_value
        targetType:
          type: string
          description: >-
            The type of the target, defining its monitoring template and
            available metrics.
          examples:
          - oracle_database
          - host
          - weblogic_j2eeserver
          - oracle_pdb
          - rac_database
        targetDisplayType:
          type: string
          description: Human-readable target type display name.
          examples:
          - Oracle Database
          - Host
          - WebLogic Server
        hostName:
          type: string
          description: The hostname where the target resides.
          example: example_value
        lifecycleStatus:
          type: string
          description: Current lifecycle status of the target.
          enum:
          - MONITORED
          - BLACKOUT
          - PENDING
          - DELETED
          example: MONITORED
        availabilityStatus:
          type: string
          description: Current availability status reported by monitoring.
          enum:
          - UP
          - DOWN
          - UNKNOWN
          - UNREACHABLE
          - BLACKOUT
          - NOT_MONITORED
          - ERROR
          - AGENT_UNREACHABLE
          - PENDING
          example: UP
        agentUrl:
          type: string
          description: URL of the management agent monitoring this target.
          example: https://www.example.com
        oracleHome:
          type: string
          description: Oracle home directory path, applicable to Oracle targets.
          example: example_value
        machineName:
          type: string
          description: Machine name where the target is deployed.
          example: example_value
        installLocation:
          type: string
          description: Installation directory path for the target software.
          example: example_value
        timezone:
          type: string
          description: Time zone of the target.
          example: example_value
        owner:
          type: string
          description: Enterprise Manager user who owns this target.
          example: example_value
        timeCreated:
          type: string
          format: date-time
          description: Timestamp when the target was added to Enterprise Manager.
          example: '2026-01-15T10:30:00Z'
        timeUpdated:
          type: string
          format: date-time
          description: Timestamp of the last target configuration update.
          example: '2026-01-15T10:30:00Z'
        properties:
          type: object
          description: Additional target-type-specific configuration properties.
          additionalProperties:
            type: string
          example: example_value
        canonicalLink:
          type: string
          format: uri
          description: Canonical URI for this target resource.
          example: https://www.example.com
    TargetCreateRequest:
      type: object
      description: Request body for creating a new target.
      required:
      - targetName
      - targetType
      - hostName
      properties:
        targetName:
          type: string
          description: Display name for the target.
          example: example_value
        targetType:
          type: string
          description: >-
            Target type identifier defining the monitoring template.
          examples:
          - oracle_database
          - host
          - weblogic_j2eeserver
        hostName:
          type: string
          description: The hostname where the target resides.
          example: example_value
        properties:
          type: object
          description: >-
            Target-type-specific properties required for monitoring.
          additionalProperties:
            type: string
          example: example_value
        credentials:
          type: object
          description: Monitoring credentials for the target.
          properties:
            credentialName:
              type: string
              description: Name of a named credential to use.
            credentialType:
              type: string
              description: Type of credential.
          example: example_value
    TargetUpdateRequest:
      type: object
      description: Request body for updating an existing target.
      properties:
        properties:
          type: object
          description: Properties to update on the target.
          additionalProperties:
            type: string
          example: example_value
    TargetCollection:
      type: object
      description: Paginated collection of targets.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Target'
          example: []
        totalCount:
          type: integer
          description: Total number of targets matching the query.
          example: 10
        limit:
          type: integer
          description: Maximum items per page.
          example: 10
        offset:
          type: integer
          description: Current offset in the result set.
          example: 10
        hasMore:
          type: boolean
          description: Whether more results are available.
          example: true
    TargetProperty:
      type: object
      description: A configuration property of a target.
      properties:
        name:
          type: string
          description: Property name.
          example: Example Title
        value:
          type: string
          description: Property value.
          example: example_value
        isReadOnly:
          type: boolean
          description: Whether the property is read-only.
          example: true
    TargetPropertyCollection:
      type: object
      description: Collection of target properties.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TargetProperty'
          example: []
    BulkPropertyUpdateRequest:
      type: object
      description: Request body for bulk property updates.
      properties:
        properties:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: string
          example: []
    MetricGroup:
      type: object
      description: >-
        Defines a group of related metrics collected for a target. Each metric
        group has a name, collection frequency, and a set of metric columns.
      properties:
        metricGroupName:
          type: string
          description: Unique name of the metric group.
          example: example_value
        displayName:
          type: string
          description: Human-readable display name.
          example: example_value
        description:
          type: string
          description: Description of what this metric group measures.
          example: A sample description.
        collectionFrequency:
          type: integer
          description: Collection interval in seconds.
          example: 10
        metricColumns:
          type: array
          description: List of metric columns in this group.
          items:
            $ref: '#/components/schemas/MetricColumn'
          example: []
    MetricColumn:
      type: object
      description: A single metric column within a metric group.
      properties:
        columnName:
          type: string
          description: Name of the metric column.
          example: example_value
        displayName:
          type: string
          description: Human-readable display name.
          example: example_value
        columnType:
          type: string
          description: Data type of the metric column.
          enum:
          - NUMBER
          - STRING
          example: NUMBER
        isKey:
          type: boolean
          description: Whether this column is a key column.
          example: true
        unit:
          type: string
          description: Unit of measurement for the metric.
          example: example_value
    MetricGroupCollection:
      type: object
      description: Collection of metric groups.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MetricGroup'
          example: []
    MetricDataPoint:
      type: object
      description: A single metric data point.
      properties:
        metricColumn:
          type: string
          description: Name of the metric column.
          example: example_value
        value:
          type: number
          description: Numeric metric value.
          example: 42.5
        key:
          type: string
          description: Key value identifying the metric row.
          example: example_value
        collectionTime:
          type: string
          format: date-time
          description: Timestamp when the metric was collected.
          example: '2026-01-15T10:30:00Z'
    MetricDataCollection:
      type: object
      description: Collection of metric data points.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MetricDataPoint'
          example: []
    MetricTimeSeries:
      type: object
      description: Time series data for a single metric.
      properties:
        targetName:
          type: string
          description: Name of the target.
          example: example_value
        targetType:
          type: string
          description: Type of the target.
          example: example_value
        metricGroupName:
          type: string
          description: Name of the metric group.
          example: example_value
        metricColumnName:
          type: string
          description: Name of the metric column.
          example: example_value
        key:
          type: string
          description: Key value for the metric row.
          example: example_value
        dataPoints:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              value:
                type: number
          example: []
    MetricTimeSeriesCollection:
      type: object
      description: Collection of metric time series.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MetricTimeSeries'
          example: []
    Incident:
      type: object
      description: >-
        Represents an incident in Enterprise Manager. Incidents are actionable
        issues detected by monitoring rules, correlated from one or more events.
      properties:
        incidentId:
          type: string
          description: Unique identifier of the incident.
          example: '500123'
        summary:
          type: string
          description: Brief summary of the incident.
          example: example_value
        severity:
          type: string
          description: Severity level of the incident.
          enum:
          - FATAL
          - CRITICAL
          - WARNING
          - ADVISORY
          - INFORMATIONAL
          example: FATAL
        priority:
          type: string
          description: Priority assigned to the incident.
          enum:
          - URGENT
          - HIGH
          - MEDIUM
          - LOW
          - NONE
          example: URGENT
        status:
          type: string
          description: Current status of the incident.
          enum:
          - NEW
          - WORK_IN_PROGRESS
          - RESOLVED
          - CLOSED
          - SUPPRESSED
          example: NEW
        category:
          type: string
          description: Category of the incident.
          enum:
          - AVAILABILITY
          - PERFORMANCE
          - SECURITY
          - CONFIGURATION
          - ERROR
          - CAPACITY
          - COMPLIANCE
          example: AVAILABILITY
        targetName:
          type: string
          description: Name of the target associated with this incident.
          example: example_value
        targetType:
          type: string
          description: Type of the target associated with this incident.
          example: example_value
        escalationLevel:
          type: integer
          description: Current escalation level of the incident.
          example: 10
        owner:
          type: string
          description: Username of the incident owner or assignee.
          example: example_value
        acknowledgedBy:
          type: string
          description: Username of the person who acknowledged the incident.
          example: example_value
        resolutionState:
          type: string
          description: Resolution state providing closure details.
          example: example_value
        ruleSetName:
          type: string
          description: Name of the incident rule set that created this incident.
          example: example_value
        timeRaised:
          type: string
          format: date-time
          description: Timestamp when the incident was first raised.
          example: '2026-01-15T10:30:00Z'
        timeUpdated:
          type: string
          format: date-time
          description: Timestamp of the last incident update.
          example: '2026-01-15T10:30:00Z'
        timeResolved:
          type: string
          format: date-time
          description: Timestamp when the incident was resolved.
          example: '2026-01-15T10:30:00Z'
        eventCount:
          type: integer
          description: Number of events correlated into this incident.
          example: 10
        canonicalLink:
          type: string
          format: uri
          description: Canonical URI for this incident resource.
          example: https://www.example.com
    IncidentCollection:
      type: object
      description: Paginated collection of incidents.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Incident'
          example: []
        totalCount:
          type: integer
          description: Total number of incidents matching the query.
          example: 10
        limit:
          type: integer
          example: 10
        offset:
          type: integer
          example: 10
        hasMore:
          type: boolean
          example: true
    Event:
      type: object
      description: >-
        Represents a monitoring event detected by Enterprise Manager. Events
        are the atomic detections that are correlated into incidents.
      properties:
        eventId:
          type: string
          description: Unique identifier of the event.
          example: '500123'
        eventType:
          type: string
          description: Type of the event.
          enum:
          - METRIC_ALERT
          - TARGET_AVAILABILITY
          - JOB_STATUS_CHANGE
          - COMPLIANCE_VIOLATION
          - USER_REPORTED
          example: METRIC_ALERT
        severity:
          type: string
          description: Severity of the event.
          enum:
          - FATAL
          - CRITICAL
          - WARNING
          - ADVISORY
          - INFORMATIONAL
          - CLEAR
          example: FATAL
        message:
          type: string
          description: Descriptive message for the event.
          example: example_value
        targetName:
          type: string
          description: Name of the target that generated this event.
          example: example_value
        targetType:
          type: string
          description: Type of the target that generated this event.
          example: example_value
        metricGroupName:
          type: string
          description: Name of the metric group, if this is a metric alert event.
          example: example_value
        metricColumnName:
          type: string
          description: Name of the metric column, if this is a metric alert event.
          example: example_value
        metricValue:
          type: number
          description: Metric value that triggered the event.
          example: 42.5
        timeRaised:
          type: string
          format: date-time
          description: Timestamp when the event was raised.
          example: '2026-01-15T10:30:00Z'
        timeResolved:
          type: string
          format: date-time
          description: Timestamp when the event was resolved.
          example: '2026-01-15T10:30:00Z'
        canonicalLink:
          type: string
          format: uri
          description: Canonical URI for this event resource.
          example: https://www.example.com
    EventCollection:
      type: object
      description: Collection of events.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Event'
          example: []
    Annotation:
      type: object
      description: >-
        A comment or note attached to an incident, providing investigation
        details or remediation notes.
      properties:
        annotationId:
          type: string
          description: Unique identifier of the annotation.
          example: '500123'
        summary:
          type: string
          description: Summary text of the annotation.
          example: example_value
        details:
          type: string
          description: Detailed content of the annotation.
          example: example_value
        author:
          type: string
          description: Username of the annotation author.
          example: example_value
        timeCreated:
          type: string
          format: date-time
          description: Timestamp when the annotation was created.
          example: '2026-01-15T10:30:00Z'
    AnnotationCollection:
      type: object
      description: Collection of annotations.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Annotation'
          example: []
    Blackout:
      type: object
      description: >-
        Represents a blackout (maintenance window) in Enterprise Manager.
        Blackouts suppress alerting and notifications for specified targets
        during scheduled maintenance periods.
      properties:
        blackoutId:
          type: string
          description: Unique identifier of the blackout.
          example: '500123'
        blackoutName:
          type: string
          description: Display name of the blackout.
          example: example_value
        description:
          type: string
          description: Description of the blackout purpose.
          example: A sample description.
        status:
          type: string
          description: Current status of the blackout.
          enum:
          - SCHEDULED
          - STARTED
          - STOPPED
          - ENDED
          - MODIFY_PENDING
          example: SCHEDULED
        reason:
          type: string
          description: Reason for the blackout.
          example: example_value
        createdBy:
          type: string
          description: Username of the blackout creator.
          example: example_value
        schedule:
          $ref: '#/components/schemas/BlackoutSchedule'
        targets:
          type: array
          description: List of targets included in the blackout.
          items:
            $ref: '#/components/schemas/BlackoutTarget'
          example: []
        timeCreated:
          type: string
          format: date-time
          description: Timestamp when the blackout was created.
          example: '2026-01-15T10:30:00Z'
        timeUpdated:
          type: string
          format: date-time
          description: Timestamp of the last blackout update.
          example: '2026-01-15T10:30:00Z'
        canonicalLink:
          type: string
          format: uri
          description: Canonical URI for this blackout resource.
          example: https://www.example.com
    BlackoutSchedule:
      type: object
      description: Schedule definition for a blackout.
      properties:
        startTime:
          type: string
          format: date-time
          description: Scheduled start time of the blackout.
          example: '2026-01-15T10:30:00Z'
        endTime:
          type: string
          format: date-time
          description: Scheduled end time of the blackout.
          example: '2026-01-15T10:30:00Z'
        duration:
          type: integer
          description: Duration in minutes if no explicit end time is specified.
          example: 10
        timezone:
          type: string
          description: Time zone for the schedule.
          example: example_value
        frequency:
          type: string
          description: Recurrence frequency for repeating blackouts.
          enum:
          - ONCE
          - DAILY
          - WEEKLY
          - MONTHLY
          - YEARLY
          example: ONCE
        repeatInterval:
          type: integer
          description: Interval for repeating blackouts (e.g., every 2 weeks).
          example: 10
        daysOfWeek:
          type: array
          description: Days of the week for weekly recurrence.
          items:
            type: string
            enum:
            - SUNDAY
            - MONDAY
            - TUESDAY
            - WEDNESDAY
            - THURSDAY
            - FRIDAY
            - SATURDAY
          example: []
    BlackoutTarget:
      type: object
      description: A target included in a blackout.
      properties:
        targetName:
          type: string
          description: Name of the target.
          example: example_value
        targetType:
          type: string
          description: Type of the target.
          example: example_value
        includeMembers:
          type: boolean
          description: >-
            Whether to include member targets (for composite targets and groups).
          example: true
    BlackoutCreateRequest:
      type: object
      description: Request body for creating a new blackout.
      required:
      - blackoutName
      - schedule
      - targets
      properties:
        blackoutName:
          type: string
          description: Display name for the blackout.
          example: example_value
        description:
          type: string
          description: Description of the blackout purpose.
          example: A sample description.
        reason:
          type: string
          description: Reason for the blackout.
          example: example_value
        schedule:
          $ref: '#/components/schemas/BlackoutSchedule'
        targets:
          type: array
          description: List of targets to include in the blackout.
          items:
            $ref: '#/components/schemas/BlackoutTarget'
          example: []
    BlackoutUpdateRequest:
      type: object
      description: Request body for updating a blackout.
      properties:
        description:
          type: string
          example: A sample description.
        reason:
          type: string
          example: example_value
        schedule:
          $ref: '#/components/schemas/BlackoutSchedule'
        targets:
          type: array
          items:
            $ref: '#/components/schemas/BlackoutTarget'
          example: []
    BlackoutCollection:
      type: object
      description: Paginated collection of blackouts.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Blackout'
          example: []
        totalCount:
          type: integer
          example: 10
