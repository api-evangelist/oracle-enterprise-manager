specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Oracle Enterprise Manager
providerId: oracle-enterprise-manager
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Enterprise Management
  - Monitoring
  - Oracle
  - Rate Limiting
notes: OEM is on-premises management software. Throughput depends on the Oracle Management Server (OMS)
  sizing, the OEM repository database, and the agent fleet topology — there are no upstream-published
  per-second numeric rate limits. The OEM REST API throughput is bounded by WebLogic and the underlying
  repository.
description: Oracle Enterprise Manager throughput is operator-controlled — the OEM Management Server
  is an on-prem WebLogic deployment with its repository database in Oracle. There is no centrally enforced
  per-tenant rate limit; the EMCLI / REST API performance is shaped by OMS sizing and back-end DB performance.
sources:
  - https://docs.oracle.com/en/enterprise-manager/cloud-control/
responseCodes:
  throttled: 429
  unavailable: 503
limits:
  - name: OMS REST / EMCLI throughput
    scope: management-server
    metric: varies
    limit: bounded by OMS WebLogic + repository DB sizing
  - name: Agent upload rate
    scope: agent
    metric: varies
    limit: configured per agent (uploadInterval)
  - name: OCI Observability + Management services
    scope: tenancy/region/service
    metric: varies
    limit: see OCI service docs (per-service throttling)
policies:
  - name: OMS sizing
    description: Follow Oracle's OEM sizing guide (small / medium / large) to provision OMS instances
      and repository DB capacity for your agent count.
  - name: Agent upload tuning
    description: Tune agent upload intervals to balance freshness vs OMS load.
  - name: Backoff
    description: Honor 429 / 503 from OCI O+M services; for OMS REST, retry with backoff on transient
      WebLogic errors.
maintainers:
