meters:
  - name: diagnostics_pack_licenses
    unit: processor or NUP
    aggregation: max
    dimensions:
      - target_type
      - environment
  - name: tuning_pack_licenses
    unit: processor or NUP
    aggregation: max
    dimensions:
      - target_type
      - environment
  - name: db_lifecycle_management_pack_licenses
    unit: processor or NUP
    aggregation: max
    dimensions:
      - target_type
  - name: other_pack_licenses
    unit: processor or NUP
    aggregation: max
    dimensions:
      - pack
      - target_type
  - name: annual_support
    unit: USD-year
    aggregation: sum
    dimensions:
      - pack
      - contract
  - name: oci_observability_consumption
    unit: varies
    aggregation: sum
    dimensions:
      - service
      - region
principles:
  - name: Visibility
    description: Maintain a target-to-pack matrix — which databases, hosts, middleware are entitled to
      Diagnostics, Tuning, DBLM, etc. Reconcile with Oracle LMS audit data; track OCI O+M consumption
      separately.
  - name: Allocation
    description: Allocate Management Pack cost to the team that owns the target estate (DBA team for
      Diagnostics/Tuning/DBLM; platform team for Cloud Management Pack).
  - name: Optimization
    description: Eliminate Diagnostics/Tuning Pack on environments that don't need them (Dev, DR); migrate
      lightweight monitoring needs to OCI O+M consumption-based services; ensure Tuning Pack always paired
      with Diagnostics Pack (license rule). Each pack carries 22% annual support — every removed pack
      saves the support stream too.
  - name: Accountability
    description: A named DBA or platform manager owns the OEM pack catalog and reconciles before each
      annual true-up; finance owns annual support renewal.
