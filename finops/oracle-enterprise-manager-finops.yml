reconciled: true
tags:
  - Enterprise Management
  - Monitoring
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps for Oracle Enterprise Manager: the OEM framework itself is included
  with Oracle DB licenses, but each Management Pack (Diagnostics, Tuning, Database Lifecycle Management,
  Cloud Management, etc.) is a separately-licensed perpetual line item with 22% annual support, sized
  on the same metric (Processor or NUP) as the targets being managed. OCI Observability and Management
  is the cloud-native consumption-based alternative.'
sources:
  - https://www.oracle.com/manageability/
  - https://docs.oracle.com/en/enterprise-manager/cloud-control/enterprise-manager-cloud-control/24.1/oemli/
