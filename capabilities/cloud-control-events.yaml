naftiko: 1.0.0-alpha2
info:
  label: Oracle Enterprise Manager Cloud Control REST API — Events
  description: 'Oracle Enterprise Manager Cloud Control REST API — Events. 1 operations. Lead operation: Oracle Enterprise
    Manager Get Event Details. Self-contained Naftiko capability covering one Oracle Enterprise Manager business surface.'
  tags:
  - Oracle Enterprise Manager
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ORACLE_ENTERPRISE_MANAGER_API_KEY: ORACLE_ENTERPRISE_MANAGER_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-control-events
    baseUri: https://{emHost}:{emPort}/em/api
    description: Oracle Enterprise Manager Cloud Control REST API — Events business capability. Self-contained, no shared
      references.
    resources:
    - name: events-eventId
      path: /events/{eventId}
      operations:
      - name: getevent
        method: GET
        description: Oracle Enterprise Manager Get Event Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.ORACLE_ENTERPRISE_MANAGER_USER}}'
      password: '{{env.ORACLE_ENTERPRISE_MANAGER_PASS}}'
  exposes:
  - type: rest
    namespace: cloud-control-events-rest
    port: 8080
    description: REST adapter for Oracle Enterprise Manager Cloud Control REST API — Events. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/events/{eventid}
      name: events-eventid
      description: REST surface for events-eventId.
      operations:
      - method: GET
        name: getevent
        description: Oracle Enterprise Manager Get Event Details
        call: cloud-control-events.getevent
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-control-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Oracle Enterprise Manager Cloud Control REST API — Events. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: oracle-enterprise-manager-get-event
      description: Oracle Enterprise Manager Get Event Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-control-events.getevent
      outputParameters:
      - type: object
        mapping: $.
